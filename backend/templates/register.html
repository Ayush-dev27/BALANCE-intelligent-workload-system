<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BALANCE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-center">
        <div class="auth-branding">
            <h1 class="auth-logo">BALANCE</h1>
            <p class="auth-subtitle">Intelligent Workload Manager</p>
        </div>

        <div class="auth-card">
            <h2 class="auth-card-title">Register</h2>

            <div class="auth-form">
                <label class="auth-label" for="register-username">Username</label>
                <input type="text" id="register-username" class="auth-input" placeholder="Username" />

                <label class="auth-label" for="register-password">Password</label>
                <input type="password" id="register-password" class="auth-input" placeholder="Password" />

                <button type="button" id="register-submit" class="auth-btn-primary">Register</button>
            </div>

            <p class="auth-footer">
                Already have an account? <a href="{{ url_for('login') }}" class="auth-link">Login</a>
            </p>
            <p id="register-error" class="auth-error"></p>
        </div>
    </div>

    <script>
    document.getElementById("register-submit").addEventListener("click", async function () {
        const username = document.getElementById("register-username").value;
        const password = document.getElementById("register-password").value;

        if (!username || !password) {
            document.getElementById("register-error").textContent = "Please enter username and password.";
            return;
        }

        const res = await fetch("/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
            document.getElementById("register-error").textContent = data.error || "Registration failed.";
            return;
        }

        window.location.href = "/login";
    });
    </script>
</body>
</html>
